<!DOCTYPE html>
<html>

<head>

<title>Add Student</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container">

<h2 class="mt-4">Add Student</h2>

<form method="post">

<input class="form-control mt-3" name="name" placeholder="Name">

<input class="form-control mt-3" name="roll" placeholder="Roll Number">

<input class="form-control mt-3" name="marks" placeholder="Marks">

<button class="btn btn-success mt-3">Add Student</button>

</form>

</body>

</html>
