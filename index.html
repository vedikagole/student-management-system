<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container">

<h1 class="mt-4">Student Management System</h1>

<a href="/add" class="btn btn-success mt-3">Add Student</a>

<table class="table table-bordered mt-4">

<tr>
<th>ID</th>
<th>Name</th>
<th>Roll</th>
<th>Marks</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>

<td>{{s['id']}}</td>
<td>{{s['name']}}</td>
<td>{{s['roll']}}</td>
<td>{{s['marks']}}</td>

<td>

<a href="/edit/{{s['id']}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{s['id']}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html><app class="py"></app>
