<!DOCTYPE html>
<html>

<head>

<title>Edit Student</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container">

<h2 class="mt-4">Edit Student</h2>

<form method="post">

<input class="form-control mt-3" name="name" value="{{student['name']}}">

<input class="form-control mt-3" name="roll" value="{{student['roll']}}">

<input class="form-control mt-3" name="marks" value="{{student['marks']}}">

<button class="btn btn-primary mt-3">Update Student</button>

</form>

</body>

</html>
